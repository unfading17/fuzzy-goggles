# Streamlit Configuration for Permitai
[theme]
primaryColor = "#2563eb"
backgroundColor = "#020617"
secondaryBackgroundColor = "#0f172a"
textColor = "#f8fafc"
font = "sans serif"

[server]
headless = true
port = 8501
enableXsrfProtection = true
enableCORS = false
allowRunOnSave = true
maxUploadSize = 200
requireUserConfirmation = false

[client]
toolbarMode = "viewer"
showErrorDetails = false

[logger]
level = "info"
messageFormat = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[browser]
GatherUsageStats = false
ServerAddress = "localhost"
