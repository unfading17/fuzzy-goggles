<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>📝 My To-Do List</h1>
                <div class="header-controls">
                    <button class="btn-theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                        🌙
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Sidebar -->
            <aside class="app-sidebar">
                <div class="sidebar-section">
                    <h3>Statistics</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalTasks">0</div>
                            <div class="stat-label">Total Tasks</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="completedTasks">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="completionPercentage">0%</div>
                            <div class="stat-label">Progress</div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>Categories</h3>
                    <div class="categories-list" id="categoriesList">
                        <button class="category-tag active" data-category="all" onclick="app.filterByCategory('all')">
                            All Tasks
                        </button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>Actions</h3>
                    <button class="btn btn-secondary" id="exportBtn">
                        ⬇️ Export
                    </button>
                    <button class="btn btn-secondary" id="importBtn">
                        ⬆️ Import
                    </button>
                    <button class="btn btn-danger" id="clearAllBtn">
                        🗑️ Clear All
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <section class="app-content">
                <!-- Input Section -->
                <div class="input-section">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="taskInput" 
                            class="task-input" 
                            placeholder="Add a new task..."
                            autofocus
                        >
                        <button class="btn btn-primary" id="addTaskBtn">Add Task</button>
                    </div>

                    <!-- Task Options -->
                    <div class="task-options">
                        <div class="option-group">
                            <label for="categorySelect">Category:</label>
                            <select id="categorySelect" class="select-input">
                                <option value="General">General</option>
                                <option value="Work">Work</option>
                                <option value="Personal">Personal</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Health">Health</option>
                            </select>
                        </div>

                        <div class="option-group">
                            <label for="prioritySelect">Priority:</label>
                            <select id="prioritySelect" class="select-input">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>

                        <div class="option-group">
                            <label for="dueDateInput">Due Date:</label>
                            <input type="date" id="dueDateInput" class="date-input">
                        </div>
                    </div>
                </div>

                <!-- Filter Section -->
                <div class="filter-section">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="🔍 Search tasks..."
                    >
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all" onclick="app.filterByStatus('all')">
                            All
                        </button>
                        <button class="filter-btn" data-filter="active" onclick="app.filterByStatus('active')">
                            Active
                        </button>
                        <button class="filter-btn" data-filter="completed" onclick="app.filterByStatus('completed')">
                            Completed
                        </button>
                    </div>
                </div>

                <!-- Tasks List -->
                <div class="tasks-list" id="tasksList">
                    <div class="empty-state">
                        <p>📭 No tasks yet. Add one to get started!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" style="display: none;" accept=".json">

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
