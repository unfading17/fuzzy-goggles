version: '3.8'

services:
  permitai-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: permitai-web
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://permitai_user:permitai_pass@postgres:5432/permitai_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./temp_uploads:/app/temp_uploads
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - postgres
      - redis
    networks:
      - permitai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:15-alpine
    container_name: permitai-db
    environment:
      - POSTGRES_DB=permitai_db
      - POSTGRES_USER=permitai_user
      - POSTGRES_PASSWORD=permitai_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - permitai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permitai_user -d permitai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: permitai-cache
    volumes:
      - redis_data:/data
    networks:
      - permitai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --requirepass permitai_redis_pass

volumes:
  postgres_data:
  redis_data:

networks:
  permitai-network:
    driver: bridge
